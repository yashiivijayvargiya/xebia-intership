<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Smart Task Manager — Add, complete, and organize your tasks with a beautiful themed interface, priorities, due dates, and search." />
  <title>Smart Task Manager</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Ambient background blobs -->
    <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

    <!-- Header -->
    <header id="header">
      <div class="header__top-row">
        <h1 class="header__title">Smart Task Manager</h1>
        <!-- Dark / Light Mode Toggle -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <p class="header__subtitle">Organize your day, one task at a time</p>
      <div id="counters" class="counters" aria-live="polite">
        <span class="counter" id="count-total" title="Total tasks">
          <span class="counter__icon">📋</span>
          <span class="counter__label">Total</span>
          <span class="counter__value" id="count-total-value">0</span>
        </span>
        <span class="counter" id="count-pending" title="Pending tasks">
          <span class="counter__icon">⏳</span>
          <span class="counter__label">Pending</span>
          <span class="counter__value" id="count-pending-value">0</span>
        </span>
        <span class="counter" id="count-done" title="Completed tasks">
          <span class="counter__icon">✅</span>
          <span class="counter__label">Done</span>
          <span class="counter__value" id="count-done-value">0</span>
        </span>
      </div>
    </header>

    <!-- Add Task Form -->
    <form id="task-form" class="task-form" autocomplete="off">
      <div class="task-form__input-wrap">
        <input
          type="text"
          id="task-input"
          class="task-form__input"
          placeholder="What needs to be done?"
          aria-label="New task title"
          maxlength="200"
        />
        <button type="submit" id="submit-btn" class="task-form__btn" aria-label="Add task">
          <svg class="task-form__btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>Add</span>
        </button>
      </div>
      <!-- Priority & Due Date Row -->
      <div class="task-form__options-row">
        <div class="task-form__option">
          <label for="task-priority" class="task-form__option-label">Priority</label>
          <select id="task-priority" class="task-form__select" aria-label="Task priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="task-form__option">
          <label for="task-due-date" class="task-form__option-label">Due Date</label>
          <input type="date" id="task-due-date" class="task-form__date" aria-label="Due date" />
        </div>
      </div>
    </form>

    <!-- Search Bar -->
    <div class="search-bar" id="search-bar">
      <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="search-input"
        class="search-bar__input"
        placeholder="Search tasks..."
        aria-label="Search tasks"
      />
      <button id="search-clear" class="search-bar__clear" aria-label="Clear search" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Filter Bar -->
    <nav id="filter-bar" class="filter-bar" aria-label="Task filters">
      <button class="filter-btn filter-btn--active" id="filter-all" data-filter="all">All</button>
      <button class="filter-btn" id="filter-pending" data-filter="pending">Pending</button>
      <button class="filter-btn" id="filter-completed" data-filter="completed">Completed</button>
    </nav>

    <!-- Main content: two-section task list -->
    <main id="task-sections">
      <!-- Pending Section -->
      <section id="section-pending" class="task-section">
        <h2 class="task-section__heading">
          <span class="task-section__dot task-section__dot--pending"></span>
          Pending Tasks
        </h2>
        <ul id="task-list-pending" class="task-list" aria-label="Pending tasks"></ul>
      </section>

      <!-- Completed Section -->
      <section id="section-completed" class="task-section">
        <h2 class="task-section__heading">
          <span class="task-section__dot task-section__dot--completed"></span>
          Completed Tasks
        </h2>
        <ul id="task-list-completed" class="task-list" aria-label="Completed tasks"></ul>
      </section>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" hidden>
        <span class="empty-state__emoji" aria-hidden="true"></span>
        <p class="empty-state__text"></p>
      </div>
    </main>
  </div>

  <script src="taskManager.js"></script>
  <script src="app.js"></script>
</body>
</html>
